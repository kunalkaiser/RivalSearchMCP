# Canonical label taxonomy for RivalSearchMCP.
#
# Source of truth: this file. To sync labels to GitHub from this file, run
# the EndBug/label-sync action (or any equivalent) — see
# https://github.com/EndBug/label-sync.
#
# Conventions:
#   type:*    What kind of work it is (mutually exclusive in practice)
#   P0..P3    Priority (mutually exclusive)
#   tool:*    Which MCP tool the issue/PR touches (multiple allowed)
#   status:*  Where it is in the workflow (mutually exclusive in practice)

# ───── Type ─────
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working as documented"
- name: "type:feature"
  color: "84b6eb"
  description: "New feature or capability"
- name: "type:enhancement"
  color: "a2eeef"
  description: "Improvement to existing functionality"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation changes"
- name: "type:chore"
  color: "fef2c0"
  description: "Repo plumbing, deps, config"
- name: "type:refactor"
  color: "fef2c0"
  description: "Restructure without behavior change"

# ───── Priority ─────
- name: "P0-critical"
  color: "b60205"
  description: "Drop everything and fix"
- name: "P1-high"
  color: "d93f0b"
  description: "Must fix this iteration"
- name: "P2-medium"
  color: "fbca04"
  description: "Should fix soon"
- name: "P3-low"
  color: "c5def5"
  description: "Nice to have"

# ───── Tool / area (one per MCP tool) ─────
- name: "tool:web_search"
  color: "1d76db"
  description: "Affects web_search MCP tool"
- name: "tool:social_search"
  color: "1d76db"
  description: "Affects social_search MCP tool"
- name: "tool:scientific_research"
  color: "1d76db"
  description: "Affects scientific_research MCP tool"
- name: "tool:news_aggregation"
  color: "1d76db"
  description: "Affects news_aggregation MCP tool"
- name: "tool:github_search"
  color: "1d76db"
  description: "Affects github_search MCP tool"
- name: "tool:content_operations"
  color: "1d76db"
  description: "Affects content_operations MCP tool"
- name: "tool:research_topic"
  color: "1d76db"
  description: "Affects research_topic MCP tool"
- name: "tool:research_memory"
  color: "1d76db"
  description: "Affects research_memory MCP tool"
- name: "tool:map_website"
  color: "1d76db"
  description: "Affects map_website MCP tool"
- name: "tool:document_analysis"
  color: "1d76db"
  description: "Affects document_analysis MCP tool"

# ───── Status ─────
- name: "status:needs-triage"
  color: "c2e0c6"
  description: "Awaiting initial review"
- name: "status:blocked"
  color: "d4c5f9"
  description: "Cannot proceed until dependency resolved"
- name: "status:in-progress"
  color: "0e8a16"
  description: "Active work"

# ───── Community / discoverability (defaults) ─────
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "question"
  color: "d876e3"
  description: "Further information is requested"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"
