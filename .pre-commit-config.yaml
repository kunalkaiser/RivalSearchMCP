repos:
  - repo: https://github.com/psf/black
    rev: "26.1.0"
    hooks:
      - id: black
        args: [--line-length=100]

  - repo: https://github.com/pycqa/isort
    rev: "6.0.1"
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.2"
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        # anthropics/claude-code-action validates that the calling workflow
        # file on the PR is byte-identical to the version on main. Letting
        # end-of-file-fixer "normalize" these files breaks that check on the
        # first PR that touches them; exempting them keeps both checks happy.
        exclude: ^\.github/workflows/claude.*\.yml$
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
